<svg xmlns="http://www.w3.org/2000/svg" width="28" height="32" viewBox="0 0 28 32" fill="none">
  <!-- Code bracket cursor: </> shape with neon glow -->
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Arrow pointer shape -->
  <path d="M2 1 L2 26 L8 20 L14 28 L18 26 L12 18 L20 16 Z" 
        fill="#0A0A0F" 
        stroke="#2DE2E6" 
        stroke-width="1.5" 
        stroke-linejoin="round"
        filter="url(#glow)"/>
  <!-- Small code bracket accent  </>  -->
  <g transform="translate(14, 2) scale(0.55)" filter="url(#glow)">
    <text x="0" y="14" font-family="monospace" font-weight="bold" font-size="14" fill="#A855F7">&lt;/&gt;</text>
  </g>
</svg>
