<svg xmlns="http://www.w3.org/2000/svg" width="28" height="32" viewBox="0 0 28 32" fill="none">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="neonGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2DE2E6"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
  </defs>
  <!-- Hand pointer shape -->
  <!-- Index finger -->
  <rect x="10" y="1" width="5.5" height="14" rx="2.75" fill="#14141F" stroke="url(#neonGrad)" stroke-width="1.3" filter="url(#glow)"/>
  <!-- Middle finger -->
  <rect x="16.5" y="5" width="5" height="11" rx="2.5" fill="#14141F" stroke="url(#neonGrad)" stroke-width="1.3" filter="url(#glow)"/>
  <!-- Ring finger -->
  <rect x="22" y="7" width="4.5" height="9" rx="2.25" fill="#14141F" stroke="url(#neonGrad)" stroke-width="1.3" filter="url(#glow)"/>
  <!-- Palm -->
  <path d="M5 18 Q5 12, 10 12 L26 14 Q28 14, 28 17 L28 23 Q28 30, 20 30 L12 30 Q5 30, 5 23 Z" 
        fill="#14141F" stroke="url(#neonGrad)" stroke-width="1.3" filter="url(#glow)"/>
  <!-- Thumb -->
  <path d="M5 18 Q2 16, 2 14 Q2 12, 4.5 12 L8 12 L8 18 Z" 
        fill="#14141F" stroke="url(#neonGrad)" stroke-width="1.3" filter="url(#glow)"/>
</svg>
